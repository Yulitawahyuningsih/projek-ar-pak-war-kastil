<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>ar kastil fantasi yulita</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    /* paksa video & canvas AR.js pas mengikuti ukuran layar (bukan cuma object-fit),
       karena AR.js suka nge-set width/height sendiri via JS yang bikin video kepotong/zoom */
    video, .a-canvas, canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: contain !important;
      object-position: center !important;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded
    arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;"
    vr-mode-ui="enabled: false">
    <a-assets>
      <audio id="musik-bg" src="kastil.mp3" preload="auto"></audio>
    </a-assets>

    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="25" smoothTolerance="0.005" smoothThreshold="8">
      <!-- Parent entity untuk rotasi sudut pandang, biar model dilihat dari samping -->
      <a-entity rotation="-75 0 0" position="0 0 0.8">
        <a-entity
          id="model-kastil"
          gltf-model="projek ar kastil  fantasi2.glb"
          scale="0.05 0.05 0.05"
          position="0 0 0"
          animation-mixer="clip: *; loop: repeat">
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');
    const model = document.querySelector('#model-kastil');

    marker.addEventListener('markerFound', () => {
      musik.play().catch(() => {}); // catch biar gak error kalau browser blokir autoplay
    });

    marker.addEventListener('markerLost', () => {
      musik.pause();
    });

    model.addEventListener('model-loaded', () => {
      console.log('Model kastil berhasil dimuat');
    });

    model.addEventListener('model-error', (e) => {
      console.error('Gagal memuat model:', e.detail);
    });
  </script>

</body>
</html>
